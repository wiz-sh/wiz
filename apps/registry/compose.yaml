name: wiz-registry

services:
    postgres:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: wiz
            POSTGRES_USER: wiz
            POSTGRES_PASSWORD: wiz-local-only
        ports:
            - "5432:5432"
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -U wiz -d wiz
            interval: 2s
            timeout: 5s
            retries: 20
        volumes:
            - postgres-data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "6379:6379"
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            interval: 2s
            timeout: 5s
            retries: 20

    mailpit:
        image: axllent/mailpit:latest
        restart: unless-stopped
        ports:
            - "1025:1025"
            - "8025:8025"

volumes:
    postgres-data:
