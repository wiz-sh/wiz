name: wiz-registry-development

services:
    postgres:
        image: postgres:17-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-wiz_test}
            POSTGRES_USER: ${POSTGRES_USER:-wiz_test}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiz-development-database-password}
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
            interval: 2s
            timeout: 5s
            retries: 30
        ports:
            - "55432:5432"
        networks:
            - registry-test
        volumes:
            - postgres-test:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        command:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            interval: 2s
            timeout: 5s
            retries: 30
        ports:
            - "56379:6379"
        networks:
            - registry-test

    minio:
        image: minio/minio:latest
        command: server /data --console-address :9001
        environment:
            MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-wiz-development-access-key}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-wiz-development-secret-key}
        healthcheck:
            test:
                - CMD
                - mc
                - ready
                - local
            interval: 2s
            timeout: 5s
            retries: 30
        ports:
            - "59000:9000"
            - "59001:9001"
        networks:
            - registry-test
        volumes:
            - minio-test:/data

    minio-init:
        image: minio/mc:latest
        depends_on:
            minio:
                condition: service_healthy
        entrypoint:
            - /bin/sh
            - -c
            - >-
                mc alias set local http://minio:9000
                ${S3_ACCESS_KEY_ID:-wiz-development-access-key}
                ${S3_SECRET_ACCESS_KEY:-wiz-development-secret-key} && mc mb
                --ignore-existing local/${S3_BUCKET:-wiz-packages}
        networks:
            - registry-test

    mailpit:
        image: axllent/mailpit:latest
        environment:
            MP_MAX_MESSAGES: "500"
            MP_SMTP_AUTH_ACCEPT_ANY: "1"
            MP_SMTP_AUTH_ALLOW_INSECURE: "1"
        healthcheck:
            test:
                - CMD
                - /mailpit
                - readyz
        ports:
            - "51025:1025"
            - "58025:8025"
        networks:
            - registry-test

    registry-migrate:
        build:
            context: .
            dockerfile: apps/registry/Dockerfile
        command:
            - bun
            - apps/registry/src/database/migrate.ts
        environment: &registry-environment
            REGISTRY_HOST: 0.0.0.0
            REGISTRY_PORT: "3000"
            REGISTRY_PUBLIC_URL: ${REGISTRY_PUBLIC_URL:-http://registry.test.localhost:53000}
            DATABASE_URL: postgres://${POSTGRES_USER:-wiz_test}:${POSTGRES_PASSWORD:-wiz-development-database-password}@postgres:5432/${POSTGRES_DB:-wiz_test}
            SESSION_SECRET: ${SESSION_SECRET:-development-session-secret-at-least-32-characters}
            TOKEN_PEPPER: ${TOKEN_PEPPER:-development-token-pepper-at-least-32-characters}
            PASSWORD_PEPPER: ${PASSWORD_PEPPER:-development-password-pepper-at-least-32-characters}
            WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-registry.test.localhost}
            WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Wiz Registry Development}
            WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://registry.test.localhost:53000}
            SMTP_HOST: mailpit
            SMTP_PORT: "1025"
            SMTP_SECURE: "false"
            SMTP_REQUIRE_TLS: "false"
            SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@registry.test.localhost}
            SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Wiz Registry Development}
            STORAGE_DRIVER: s3
            S3_ENDPOINT: http://minio:9000
            S3_REGION: us-east-1
            S3_BUCKET: ${S3_BUCKET:-wiz-packages}
            S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-wiz-development-access-key}
            S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-wiz-development-secret-key}
            REDIS_URL: redis://redis:6379
            RATE_LIMIT_AUTHENTICATION: ${RATE_LIMIT_AUTHENTICATION:-1000}
            RATE_LIMIT_API: ${RATE_LIMIT_API:-5000}
            RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
            LOG_LEVEL: ${LOG_LEVEL:-debug}
            LOG_FORMAT: ${LOG_FORMAT:-json}
            CORS_ORIGINS: ${CORS_ORIGINS:-http://registry.test.localhost:53000}
            CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
            CORS_MAX_AGE_SECONDS: ${CORS_MAX_AGE_SECONDS:-600}
            OTEL_ENABLED: ${OTEL_ENABLED:-false}
            OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-wiz-registry-development}
            OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
            OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-1000}
            REGISTRY_ADMIN_USERNAMES: ${REGISTRY_ADMIN_USERNAMES:-admin-e2e}
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - registry-test
        restart: "no"

    registry-api:
        build:
            context: .
            dockerfile: apps/registry/Dockerfile
        environment: *registry-environment
        depends_on:
            registry-migrate:
                condition: service_completed_successfully
            redis:
                condition: service_healthy
            minio-init:
                condition: service_completed_successfully
            mailpit:
                condition: service_healthy
        healthcheck:
            test:
                - CMD
                - bun
                - -e
                - fetch('http://127.0.0.1:3000/ready').then(r=>{if(!r.ok)process.exit(1)})
            interval: 2s
            timeout: 5s
            retries: 30
        ports:
            - "53000:3000"
        networks:
            registry-test:
                aliases:
                    - registry.test.localhost

    registry-worker:
        build:
            context: .
            dockerfile: apps/registry/Dockerfile
        command:
            - bun
            - apps/registry/src/worker.ts
        environment: *registry-environment
        depends_on:
            registry-migrate:
                condition: service_completed_successfully
            redis:
                condition: service_healthy
        healthcheck:
            test:
                - CMD
                - bun
                - -e
                - process.exit(0)
            interval: 10s
            timeout: 5s
            retries: 3
        networks:
            - registry-test

networks:
    registry-test:
        driver: bridge

volumes:
    postgres-test:
    minio-test:
