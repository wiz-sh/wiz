name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v7
              with:
                  path: suite/wiz
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/compiler
                  path: suite/compiler
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/types
                  path: suite/types
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/linter
                  path: suite/linter
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/registry
                  path: suite/registry
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/package-manager
                  path: suite/package-manager
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/lsp
                  path: suite/lsp
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"
            - run: bun install --frozen-lockfile
              working-directory: suite/wiz
            - run: bun run check && bun run build
              working-directory: suite/wiz
            - name: Publish @wiz-sh/wiz
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: bun publish --access public --tolerate-republish
              working-directory: suite/wiz/apps/cli
            - name: Publish GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release create "${{ github.ref_name }}" --generate-notes --verify-tag
              working-directory: suite/wiz
