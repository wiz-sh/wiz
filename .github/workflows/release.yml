name: Release artifacts

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"
            - run: bun install --frozen-lockfile
            - run: bun run check
            - run: bun run build
            - run: bun run --cwd apps/vscode package
            - name: Archive CLI
              run: tar -czf wiz-cli-${{ github.ref_name }}.tar.gz -C apps/cli dist package.json README.md
            - name: Publish GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release create "${{ github.ref_name }}" apps/vscode/*.vsix wiz-cli-${{ github.ref_name }}.tar.gz --generate-notes --verify-tag
