name: CI

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    BUN_VERSION: "1.3.14"

jobs:
    quality:
        name: Quality, tests, and build
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v7
              with:
                  path: suite/cli
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/compiler
                  path: suite/compiler
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/types
                  path: suite/types
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/linter
                  path: suite/linter
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/registry
                  path: suite/registry
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/package-manager
                  path: suite/package-manager
            - uses: actions/checkout@v7
              with:
                  repository: wiz-sh/lsp
                  path: suite/lsp
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: bun install --frozen-lockfile
              working-directory: suite/cli
            - run: bun run check
              working-directory: suite/cli
            - run: bun run build
              working-directory: suite/cli
