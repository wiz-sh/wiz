name: CI

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    BUN_VERSION: "1.3.14"

jobs:
    quality:
        name: Quality
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: bun install --frozen-lockfile
            - run: bun run format:check
            - run: bun run lint
            - run: bun run typecheck

    tests:
        name: Tests (${{ matrix.os }})
        needs: quality
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
        runs-on: ${{ matrix.os }}
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - name: Install target shells on Linux
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install --yes fish zsh
            - name: Install target shells on macOS
              if: runner.os == 'macOS'
              run: brew install fish
            - run: bun install --frozen-lockfile
            - run: bun test

    windows-cmd:
        name: Windows CMD target
        needs: quality
        runs-on: windows-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: bun install --frozen-lockfile
            - run: bun test packages/compiler/tests/shell-targets.test.ts --test-name-pattern "cmd executes"

    clean-build:
        name: Clean build
        needs: quality
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: bun install --frozen-lockfile
            - run: rm -rf apps/*/dist packages/*/dist
            - run: bun run build

    docs:
        name: Documentation
        needs: quality
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: bun install --frozen-lockfile
            - run: bun run --cwd apps/docs build
            - uses: actions/upload-artifact@v4
              with:
                  name: wiz-docs
                  path: apps/docs/dist
                  if-no-files-found: error

    vscode:
        name: VS Code extension
        needs: quality
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: bun install --frozen-lockfile
            - run: bun run --cwd apps/vscode test
            - run: bun run --cwd apps/vscode build
            - run: bun run --cwd apps/vscode package
            - uses: actions/upload-artifact@v4
              with:
                  name: wiz-vscode-extension
                  path: apps/vscode/*.vsix
                  if-no-files-found: error

    registry:
        name: Registry end to end
        needs: quality
        runs-on: ubuntu-latest
        timeout-minutes: 40
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: bun install --frozen-lockfile
            - run: docker compose -f docker-compose.dev.yml config
            - run: bun run registry:prod:validate
            - run: bun run registry:test:e2e
