name: CI

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    BUN_VERSION: "1.3.14"

jobs:
    quality:
        name: Quality, tests, and build
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v7
              with:
                  path: suite/wiz
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}
            - run: bun install --frozen-lockfile
              working-directory: suite/wiz
            - run: bun run check
              working-directory: suite/wiz
            - run: bun run build
              working-directory: suite/wiz
