name: wiz-registry

services:
    postgres:
        image: postgres:17-alpine
        restart: always
        env_file:
            - path: .env
              required: false
        environment:
            POSTGRES_DB: ${POSTGRES_DB:?required}
            POSTGRES_USER: ${POSTGRES_USER:?required}
            POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - backend
        volumes:
            - postgres-data:/var/lib/postgresql/data
        secrets:
            - postgres_password
        deploy:
            resources:
                limits:
                    memory: 2G

    redis:
        image: redis:7-alpine
        restart: always
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD:?required}
        command:
            - redis-server
            - --appendonly
            - "yes"
            - --requirepass
            - ${REDIS_PASSWORD:?required}
        healthcheck:
            test:
                - CMD-SHELL
                - redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - backend
        volumes:
            - redis-data:/data

    registry-migrate:
        image: ${WIZ_REGISTRY_IMAGE:?required}
        env_file:
            - path: .env
              required: false
        command:
            - bun
            - apps/registry/src/database/migrate.ts
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - backend
        read_only: true
        tmpfs:
            - /tmp
        restart: "no"

    registry-api:
        image: ${WIZ_REGISTRY_IMAGE:?required}
        restart: always
        env_file:
            - path: .env
              required: false
        depends_on:
            registry-migrate:
                condition: service_completed_successfully
            redis:
                condition: service_healthy
        healthcheck:
            test:
                - CMD
                - bun
                - -e
                - fetch('http://127.0.0.1:3000/ready').then(r=>{if(!r.ok)process.exit(1)})
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - backend
            - proxy
        read_only: true
        tmpfs:
            - /tmp
        security_opt:
            - no-new-privileges:true
        deploy:
            replicas: 2
            resources:
                limits:
                    memory: 1G

    registry-worker:
        image: ${WIZ_REGISTRY_IMAGE:?required}
        restart: always
        env_file:
            - path: .env
              required: false
        command:
            - bun
            - apps/registry/src/worker.ts
        depends_on:
            registry-migrate:
                condition: service_completed_successfully
            redis:
                condition: service_healthy
        networks:
            - backend
        read_only: true
        tmpfs:
            - /tmp
        security_opt:
            - no-new-privileges:true

networks:
    backend:
        internal: true
    proxy:

volumes:
    postgres-data:
    redis-data:

secrets:
    postgres_password:
        file: ${POSTGRES_PASSWORD_FILE:?required}
