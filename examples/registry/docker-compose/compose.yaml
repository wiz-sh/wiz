name: wiz-registry-example

services:
    postgres:
        image: postgres:17-alpine
        environment:
            POSTGRES_DB: wiz
            POSTGRES_USER: wiz
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-development-only}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U wiz -d wiz"]
            interval: 2s
            timeout: 2s
            retries: 20
    redis:
        image: redis:7-alpine
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 2s
            timeout: 2s
            retries: 20
    minio:
        image: minio/minio:latest
        command: server /data
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-development}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-development-only}
    mailpit:
        image: axllent/mailpit:latest
    registry-api:
        image: ${REGISTRY_IMAGE:-ghcr.io/wiz-sh/registry:latest}
        command: ["bun", "run", "--cwd", "apps/registry", "start"]
        environment: &registry-environment
            DATABASE_URL: postgres://wiz:${POSTGRES_PASSWORD:-development-only}@postgres:5432/wiz
            REDIS_URL: redis://redis:6379
            REGISTRY_PUBLIC_URL: http://localhost:3000
            SESSION_SECRET: ${SESSION_SECRET:-replace-this-development-secret}
            TOKEN_PEPPER: ${TOKEN_PEPPER:-replace-this-development-pepper}
            PASSWORD_PEPPER: ${PASSWORD_PEPPER:-replace-this-password-pepper}
            STORAGE_DRIVER: s3
            S3_ENDPOINT: http://minio:9000
            S3_REGION: us-east-1
            S3_BUCKET: wiz
            S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-development}
            S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-development-only}
            SMTP_HOST: mailpit
            SMTP_PORT: 1025
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        ports:
            - "3000:3000"
    registry-worker:
        image: ${REGISTRY_IMAGE:-ghcr.io/wiz-sh/registry:latest}
        command: ["bun", "run", "--cwd", "apps/registry", "worker"]
        environment: *registry-environment
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
