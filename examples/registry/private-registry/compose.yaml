services:
    registry:
        image: ${REGISTRY_IMAGE:-ghcr.io/wiz-sh/registry:latest}
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgres://wiz:development-only@postgres:5432/wiz}
            REGISTRY_PUBLIC_URL: https://packages.example.com
            CORS_ORIGINS: https://packages.example.com
            LOG_FORMAT: json
            SESSION_SECRET: ${SESSION_SECRET:-replace-this-development-secret}
            TOKEN_PEPPER: ${TOKEN_PEPPER:-replace-this-development-pepper}
            PASSWORD_PEPPER: ${PASSWORD_PEPPER:-replace-this-password-pepper}
            STORAGE_DRIVER: filesystem
            STORAGE_PATH: /data/archives
        volumes:
            - archives:/data/archives

volumes:
    archives:
