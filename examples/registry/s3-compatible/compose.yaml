services:
    minio:
        image: minio/minio:latest
        command: server /data
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-development}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-development-only}
    registry:
        image: ${REGISTRY_IMAGE:-ghcr.io/hazelcaffe/wiz-registry:latest}
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgres://wiz:development-only@postgres:5432/wiz}
            REGISTRY_PUBLIC_URL: http://localhost:3000
            SESSION_SECRET: ${SESSION_SECRET:-replace-this-development-secret}
            TOKEN_PEPPER: ${TOKEN_PEPPER:-replace-this-development-pepper}
            PASSWORD_PEPPER: ${PASSWORD_PEPPER:-replace-this-password-pepper}
            STORAGE_DRIVER: s3
            S3_ENDPOINT: http://minio:9000
            S3_REGION: us-east-1
            S3_BUCKET: wiz
            S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-development}
            S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-development-only}
